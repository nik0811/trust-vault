version: '3.8'

services:
  # SecureLens Frontend
  trustvault-frontend:
    build:
      context: ./trust-vault-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.securelens.ai/api/v1
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.securelens.ai/api/v1
    depends_on:
      - trustvault-gateway

  # TrustVault API Gateway
  trustvault-gateway:
    build: .
    ports:
      - "8080:8080"
      - "8099:8099"
    environment:
      - DATABASE_URL=postgres://trustvault:trustvault@postgres:5432/trustvault?sslmode=disable
      - KAFKA_BROKERS=kafka:29092
      - DATAHUB_URL=http://datahub-gms:8080
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=change-me-in-production
      - SUPERADMIN_EMAIL=admin@securelens.local
      - SUPERADMIN_PASSWORD=SecureLens@2026!
      - SUPERADMIN_NAME=Super Admin
      - CORS_ORIGINS=https://app.securelens.ai,https://trust-vault.oortfy.com
      - INGESTION_SIDECAR_URL=http://securelens-ingestion:8090
      - INGESTION_CALLBACK_URL=http://trustvault-gateway:8080/api/v1/datasources/callback
    depends_on:
      - postgres
      - kafka
      - qdrant
      - securelens-ingestion
    command: ["./server", "--mode=gateway"]

  # TrustVault Classification Worker
  trustvault-worker:
    build: .
    deploy:
      replicas: 2
    environment:
      - DATABASE_URL=postgres://trustvault:trustvault@postgres:5432/trustvault?sslmode=disable
      - KAFKA_BROKERS=kafka:29092
      - MODEL_PATH=/models/gliner-pii-edge-int8.onnx
    depends_on:
      - postgres
      - kafka
    command: ["./server", "--mode=worker"]

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=trustvault
      - POSTGRES_PASSWORD=trustvault
      - POSTGRES_DB=trustvault
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Kafka (KRaft mode - no ZooKeeper)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - KAFKA_LISTENERS=PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data

  # Schema Registry for DataHub
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    ports:
      - "8085:8081"
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=kafka:29092
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
    depends_on:
      - kafka

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.8.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # DataHub GMS (Metadata Service)
  datahub-gms:
    image: linkedin/datahub-gms:v0.13.0
    ports:
      - "8081:8080"
    environment:
      - DATAHUB_GMS_PORT=8080
      - EBEAN_DATASOURCE_URL=jdbc:mysql://mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8
      - EBEAN_DATASOURCE_HOST=mysql:3306
      - EBEAN_DATASOURCE_USERNAME=datahub
      - EBEAN_DATASOURCE_PASSWORD=datahub
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
      - SCHEMA_REGISTRY_TYPE=INTERNAL
      - KAFKA_SCHEMAREGISTRY_URL=http://datahub-gms:8080/schema-registry/api/
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_INDEX_BUILDER_ENABLED=true
      - ELASTICSEARCH_BUILD_INDICES_CLONE_INDICES=false
      - SKIP_ELASTICSEARCH_CHECK=true
      - GRAPH_SERVICE_IMPL=elasticsearch
      - ENTITY_SERVICE_IMPL=ebean
      - DATAHUB_ANALYTICS_ENABLED=false
      - ENTITY_REGISTRY_CONFIG_PATH=/datahub/datahub-gms/resources/entity-registry.yml
      - MAE_CONSUMER_ENABLED=true
      - MCE_CONSUMER_ENABLED=true
    depends_on:
      mysql:
        condition: service_started
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_started
      schema-registry:
        condition: service_started

  # MySQL for DataHub
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=datahub
      - MYSQL_DATABASE=datahub
      - MYSQL_USER=datahub
      - MYSQL_PASSWORD=datahub
    volumes:
      - mysql_data:/var/lib/mysql

  # Elasticsearch for DataHub
  elasticsearch:
    image: elasticsearch:7.17.18
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # Document Processing Service (Python)
  trustvault-docservice:
    build:
      context: ./docservice
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      - MODEL_PATH=/models/paddleocr-vl
    volumes:
      - docservice_models:/models

  # DataHub Ingestion Sidecar (Python)
  securelens-ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - DATAHUB_URL=http://datahub-gms:8080
    depends_on:
      - datahub-gms
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  kafka_data:
  qdrant_data:
  mysql_data:
  elasticsearch_data:
  docservice_models:
