# TrustVault Full Stack with DataHub - Development Environment
# For Apple Silicon (M1/M2), DataHub runs via Rosetta emulation

services:
  # ===========================================
  # TrustVault Core Services
  # ===========================================
  
  # TrustVault Frontend (Next.js)
  trustvault-frontend:
    build:
      context: ./trust-vault-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    container_name: trustvault-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    depends_on:
      trustvault-gateway:
        condition: service_healthy
    networks:
      - trustvault-network

  # TrustVault API Gateway
  trustvault-gateway:
    build: .
    container_name: trustvault-gateway
    ports:
      - "8080:8080"
      - "8099:8099"
    environment:
      - DATABASE_URL=postgres://trustvault:trustvault@postgres:5432/trustvault?sslmode=disable
      - KAFKA_BROKERS=kafka:29092
      - DATAHUB_URL=http://datahub-gms:8080
      - DATAHUB_OPENLINEAGE_URL=http://datahub-gms:8080/openapi/openlineage/api/v1/lineage
      - QDRANT_URL=http://qdrant:6333
      # Security Configuration
      - JWT_SECRET=trustvault-dev-secret-change-in-prod-min-32-chars
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://trustvault-frontend:3000
      # Super admin IP whitelist (empty = allow all for dev)
      - SUPERADMIN_ALLOWED_IPS=
      - LOG_LEVEL=debug
      # Superadmin bootstrap credentials (CHANGE IN PRODUCTION!)
      - SUPERADMIN_EMAIL=admin@trustvault.local
      - SUPERADMIN_PASSWORD=TrustVault@2026!
      - SUPERADMIN_NAME=Super Admin
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: ["./server", "--mode=gateway"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trustvault-network

  # TrustVault Classification Worker
  trustvault-worker:
    build: .
    container_name: trustvault-worker
    environment:
      - DATABASE_URL=postgres://trustvault:trustvault@postgres:5432/trustvault?sslmode=disable
      - KAFKA_BROKERS=kafka:29092
      - QDRANT_URL=http://qdrant:6333
      - LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: ["./server", "--mode=worker"]
    networks:
      - trustvault-network

  # ===========================================
  # Data Infrastructure
  # ===========================================

  # PostgreSQL - TrustVault primary database
  postgres:
    image: postgres:16-alpine
    container_name: trustvault-postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=trustvault
      - POSTGRES_PASSWORD=trustvault
      - POSTGRES_DB=trustvault
    volumes:
      - trustvault_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustvault"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trustvault-network

  # Kafka with KRaft (no Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: trustvault-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - trustvault_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - trustvault-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: trustvault-qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - trustvault_qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - trustvault-network

  # ===========================================
  # DataHub Stack (Metadata + OpenLineage)
  # Using platform: linux/amd64 for Apple Silicon compatibility
  # ===========================================

  # MySQL for DataHub metadata (internal only)
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: trustvault-mysql
    environment:
      MYSQL_ROOT_PASSWORD: datahub
      MYSQL_DATABASE: datahub
      MYSQL_USER: datahub
      MYSQL_PASSWORD: datahub
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --default-authentication-plugin=mysql_native_password
    volumes:
      - trustvault_mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "datahub", "-pdatahub"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - trustvault-network

  # Elasticsearch for DataHub search (internal only)
  elasticsearch:
    image: elasticsearch:7.17.18
    platform: linux/amd64
    container_name: trustvault-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - trustvault_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - trustvault-network

  # Schema Registry for Kafka (required by DataHub)
  # Schema Registry for Kafka (internal only - required by DataHub)
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: trustvault-schema-registry
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - trustvault-network

  # DataHub System Update (runs once to initialize database)
  datahub-upgrade:
    image: acryldata/datahub-upgrade:v0.14.0
    platform: linux/amd64
    container_name: trustvault-datahub-upgrade
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /metadata-models/src/main/resources && \
        cp /datahub/datahub-gms/resources/entity-registry.yml /metadata-models/src/main/resources/entity-registry.yml && \
        java -jar /datahub/datahub-upgrade/bin/datahub-upgrade.jar -u SystemUpdate
    environment:
      EBEAN_DATASOURCE_URL: jdbc:mysql://mysql:3306/datahub?verifyServerCertificate=false&useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_SCHEMAREGISTRY_URL: http://schema-registry:8081
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      GRAPH_SERVICE_IMPL: elasticsearch
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: 8080
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - trustvault-network

  # DataHub GMS (Generalized Metadata Service)
  # Internal only - accessed via TrustVault gateway proxy
  # OpenLineage endpoint: POST /openapi/openlineage/api/v1/lineage
  datahub-gms:
    image: acryldata/datahub-gms:v0.14.0
    platform: linux/amd64
    container_name: trustvault-datahub-gms
    environment:
      DATAHUB_GMS_PORT: 8080
      EBEAN_DATASOURCE_URL: jdbc:mysql://mysql:3306/datahub?verifyServerCertificate=false&useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      EBEAN_DATASOURCE_HOST: mysql:3306
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_SCHEMAREGISTRY_URL: http://schema-registry:8081
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      GRAPH_SERVICE_IMPL: elasticsearch
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      ELASTIC_ID_HASH_ALGO: MD5
      OPENLINEAGE_DEFAULT_FLOW_PLATFORM: trustvault
      MAE_CONSUMER_ENABLED: "true"
      MCE_CONSUMER_ENABLED: "true"
      PE_CONSUMER_ENABLED: "true"
      DATAHUB_ANALYTICS_ENABLED: "false"
      METADATA_SERVICE_AUTH_ENABLED: "false"
    depends_on:
      datahub-upgrade:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    networks:
      - trustvault-network

  # DataHub Frontend (for debugging/admin - optional)
  datahub-frontend:
    image: acryldata/datahub-frontend-react:v0.14.0
    platform: linux/amd64
    container_name: trustvault-datahub-frontend
    ports:
      - "9002:9002"
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: 8080
      DATAHUB_SECRET: YouKnowNothing
      DATAHUB_APP_VERSION: "1.0"
      DATAHUB_PLAY_MEM_BUFFER_SIZE: 10MB
      JAVA_OPTS: -Xms256m -Xmx512m -Dhttp.port=9002
      AUTH_OIDC_ENABLED: "false"
      AUTH_JAAS_ENABLED: "true"
      AUTH_NATIVE_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      ELASTIC_CLIENT_HOST: elasticsearch
      ELASTIC_CLIENT_PORT: 9200
      # Root user credentials for DataHub
      DATAHUB_ROOT_USER: datahub
      DATAHUB_ROOT_USER_PASSWORD: datahub
    depends_on:
      datahub-gms:
        condition: service_started
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - trustvault-network

  # ===========================================
  # Classification Service (GLiNER ONNX)
  # ===========================================

  trustvault-classifier:
    build:
      context: ./models
      dockerfile: Dockerfile
    container_name: trustvault-classifier
    ports:
      - "8085:8085"
    environment:
      - MODEL_PATH=/models/gliner-pii-edge-int8.onnx
      - TOKENIZER_PATH=/models/tokenizer.json
      - LOG_LEVEL=info
    volumes:
      - ./models/onnx:/models
    networks:
      - trustvault-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Optional Services
  # ===========================================

  # Ingestion Sidecar (DataHub CLI wrapper)
  trustvault-ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: trustvault-ingestion
    ports:
      - "8090:8090"
    environment:
      - DATAHUB_URL=http://datahub-gms:8080
      - CALLBACK_URL=http://trustvault-gateway:8080/api/v1/datasources/callback
    depends_on:
      datahub-gms:
        condition: service_healthy
    networks:
      - trustvault-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Document Processing Service (Python OCR)
  trustvault-docservice:
    build:
      context: ./docservice
      dockerfile: Dockerfile
    container_name: trustvault-docservice
    ports:
      - "8088:8088"
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trustvault-network

networks:
  trustvault-network:
    driver: bridge

volumes:
  trustvault_postgres_data:
  trustvault_kafka_data:
  trustvault_qdrant_data:
  trustvault_mysql_data:
  trustvault_elasticsearch_data:
